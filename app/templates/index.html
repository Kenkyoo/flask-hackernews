<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HackerNews Clone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
      /* Animación suave para cuando HTMX elimina una fila */
      tr.htmx-swapping {
        opacity: 0;
        transition: opacity 0.4s ease-out;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
          <span class="badge bg-warning text-dark me-2 px-2 py-2">HN</span>
          HackerNews Feed
        </a>
      </div>
    </nav>

    <div class="container" style="max-width: 900px">
      <div class="card shadow-sm mb-4 border-0">
        <div class="card-body p-4">
          <h5 class="card-title fw-bold mb-3 text-secondary">
            Comparte una noticia
          </h5>
          <form
            hx-post="/submit"
            hx-swap="beforeend"
            hx-target="#new-new"
            class="row g-3"
          >
            <div class="col-md-6">
              <input
                type="text"
                placeholder="Título de la noticia"
                name="title"
                class="form-control form-control-lg"
                required
              />
            </div>
            <div class="col-md-4">
              <input
                type="text"
                placeholder="Autor"
                name="author"
                class="form-control form-control-lg"
                required
              />
            </div>
            <div class="col-md-2 d-grid">
              <button type="submit" class="btn btn-warning btn-lg fw-semibold">
                Enviar
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-uppercase fs-7 text-muted">
              <tr>
                <th scope="col" class="ps-4 py-3" style="width: 55%">
                  Noticia
                </th>
                <th scope="col" class="py-3" style="width: 25%">
                  Posteado por
                </th>
                <th scope="col" class="text-end pe-4 py-3" style="width: 20%">
                  Acciones
                </th>
              </tr>
            </thead>
            <tbody
              id="new-new"
              hx-target="closest tr"
              hx-swap="outerHTML swap:0.4s"
            >
              {% for new in news %}
              <tr>
                <td class="ps-4 py-3 fw-medium text-dark">
                  {{ new.New.title }}
                </td>
                <td class="py-3 text-secondary">
                  <span
                    class="badge bg-secondary-subtle text-secondary-emphasis rounded-pill"
                  >
                    @{{ new.Author.name }}
                  </span>
                </td>
                <td class="text-end pe-4 py-3">
                  <div class="btn-group btn-group-sm" role="group">
                    <button
                      class="btn btn-outline-primary"
                      hx-get="/get-edit-form/{{ new.New.new_id }}"
                    >
                      Editar
                    </button>
                    <button
                      hx-delete="/delete/{{ new.New.new_id }}"
                      class="btn btn-outline-danger"
                    >
                      Borrar
                    </button>
                  </div>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
